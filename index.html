<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#6b8f71" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet" />
  <title>차 그림일기</title>
  <style>
    :root {
      --bg: #f5f1e8;
      --card: #fffdf8;
      --ink: #3a3a32;
      --muted: #9a9384;
      --accent: #6b8f71;
      --line: #e7e1d3;
      --stroke: #5b5446;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--ink);
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }
    header { text-align: center; padding: 22px 16px 6px; }
    header h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: .02em; }
    header p { margin: 4px 0 0; font-size: 12px; color: var(--muted); }
    main { max-width: 560px; margin: 0 auto; padding: 12px 16px 96px; }

    .compose {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 1px 2px rgba(0,0,0,.03);
    }
    .label { font-size: 12px; color: var(--muted); margin: 14px 2px 6px; }
    .label:first-child { margin-top: 0; }
    .hint { font-size: 11px; color: #c2bbab; font-weight: 400; }

    /* 백지 그림판 */
    .board {
      position: relative;
      isolation: isolate;
      width: 100%;
      aspect-ratio: 4 / 3;
      background:
        repeating-linear-gradient(0deg, transparent 0 23px, #f4efe3 23px 24px),
        #ffffff;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      touch-action: none;
    }
    .board.empty::after {
      content: "빈 곳을 톡 눌러 손글씨를, 다구를 눌러 차림을 놓아보세요";
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: #cfc7b6; font-size: 13px; text-align: center; padding: 0 24px;
      pointer-events: none;
    }
    .placed {
      position: absolute; width: 64px;
      transform: translate(-50%, -50%);
      touch-action: none; cursor: grab; user-select: none;
    }
    .placed.grab { cursor: grabbing; filter: drop-shadow(0 3px 4px rgba(0,0,0,.18)); z-index: 5; }
    .placed .rm {
      position: absolute; top: -9px; right: -9px;
      width: 20px; height: 20px; border-radius: 50%;
      background: #fff; border: 1px solid var(--line);
      color: #b6ad9b; font-size: 13px; line-height: 18px; text-align: center;
      cursor: pointer; opacity: 0; transition: opacity .12s;
    }
    .placed .rs {
      position: absolute; right: -9px; bottom: -9px;
      width: 18px; height: 18px; border-radius: 50%;
      background: #fff; border: 1px solid var(--line);
      cursor: nwse-resize; opacity: 0; transition: opacity .12s; touch-action: none;
    }
    .placed .rs::before { content: "⤡"; display: block; font-size: 11px; color: #b6ad9b; line-height: 16px; text-align: center; }
    .placed.sel { z-index: 6; }
    @keyframes warePop {
      0% { transform: translate(-50%, -50%) scale(.4); opacity: 0; }
      60% { transform: translate(-50%, -50%) scale(1.12); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1); }
    }
    .placed.pop { animation: warePop .28s ease-out; }
    .placed:hover .rm, .placed.grab .rm, .placed.sel .rm,
    .placed:hover .rs, .placed.grab .rs, .placed.sel .rs { opacity: 1; }

    .placed.text {
      width: auto; max-width: 70%;
      font-family: "Nanum Pen Script", "Apple SD Gothic Neo", cursive;
      font-size: 26px; line-height: 1.25; color: var(--ink);
      white-space: pre-wrap; text-align: center; word-break: keep-all;
    }
    .placed.text.sel .txt, .placed.text.grab .txt {
      outline: 1px dashed #c2bbab; outline-offset: 3px;
    }

    /* 색칠 붓질 레이어 */
    .paint, .mini-paint {
      position: absolute; inset: 0; width: 100%; height: 100%;
      z-index: 7; pointer-events: none;
    }
    .paint path, .mini-paint path { fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .board.draw { cursor: crosshair; }
    .board.draw .placed { pointer-events: none; }

    .paintbar { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .draw-toggle, .undo-stroke {
      font-size: 13px; padding: 7px 12px; border: 1px solid var(--line);
      background: #fff; border-radius: 10px; cursor: pointer; color: var(--muted);
    }
    .draw-toggle.on { background: var(--accent); color: #fff; border-color: var(--accent); }
    .undo-stroke { display: none; }
    .paintbar.on .undo-stroke { display: inline-block; }
    .swatches { display: none; gap: 6px; }
    .paintbar.on .swatches { display: flex; }
    .swatch {
      width: 24px; height: 24px; border-radius: 50%;
      border: 2px solid #fff; box-shadow: 0 0 0 1px var(--line); cursor: pointer;
    }
    .swatch.sel { box-shadow: 0 0 0 2px var(--accent); transform: scale(1.12); }

    .defs { position: absolute; }
    .ware-svg { width: 100%; height: auto; display: block; pointer-events: none; overflow: visible; }
    .ware-svg * {
      fill: var(--card); stroke: var(--stroke);
      stroke-width: 2.4; stroke-linejoin: round; stroke-linecap: round;
      vector-effect: non-scaling-stroke;
    }
    .ware-svg .dot { fill: var(--stroke); stroke: none; }

    /* 다구 팔레트 */
    .palette { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .palette button {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      width: 60px; padding: 6px 2px 4px;
      border: 1px solid var(--line); background: #fff;
      border-radius: 12px; cursor: pointer;
    }
    .palette button:active { background: #eef3ec; }
    .palette .pic { width: 34px; height: 34px; }
    .palette .nm { font-size: 11px; color: var(--muted); }

    input[type="text"] {
      width: 100%; font-size: 16px; color: var(--ink);
      padding: 11px 12px; border: 1px solid var(--line);
      border-radius: 10px; background: #fff;
    }
    input::placeholder { color: #c4bdac; }

    .save {
      width: 100%; margin-top: 18px;
      font-size: 16px; font-weight: 600; color: #fff;
      background: var(--accent); border: none;
      padding: 13px; border-radius: 12px; cursor: pointer;
    }
    .save:active { opacity: .9; }

    .timeline { margin-top: 26px; }
    .timeline h2 { font-size: 13px; color: var(--muted); font-weight: 600; margin: 0 2px 10px; }
    .empty { color: var(--muted); font-size: 14px; text-align: center; padding: 30px 0; }

    .entry {
      background: var(--card); border: 1px solid var(--line);
      border-radius: 16px; padding: 14px; margin-bottom: 12px;
      display: flex; gap: 14px;
    }
    .mini {
      position: relative; isolation: isolate; width: 104px; flex-shrink: 0;
      aspect-ratio: 4 / 3; background: #fff;
      border: 1px solid var(--line); border-radius: 10px; overflow: hidden;
    }
    .mini .placed { width: 26px; cursor: default; }
    .mini .placed.text { width: auto; max-width: 84%; }
    .mini .placed .rm, .mini .placed .rs { display: none; }
    .entry .body { flex: 1; min-width: 0; }
    .entry .date { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .entry .fields { font-size: 14px; line-height: 1.55; }
    .entry .fields .k { color: var(--muted); margin-right: 4px; }
    .entry .del {
      background: none; border: none; color: #cfc7b6; font-size: 18px;
      cursor: pointer; padding: 0 2px; align-self: flex-start;
    }
    .legacy-ware { font-size: 26px; }
    .entry .fields .none { color: #c2bbab; font-style: italic; }
    @keyframes justSaved {
      0% { background: #eaf1e9; box-shadow: 0 0 0 2px var(--accent); }
      100% { background: var(--card); box-shadow: 0 1px 2px rgba(0,0,0,.03); }
    }
    .entry.just-saved { animation: justSaved 1.6s ease-out; }
    .undo {
      position: fixed; left: 50%; bottom: 24px;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink); color: #fff; border-radius: 12px;
      padding: 10px 10px 10px 16px; display: flex; align-items: center; gap: 10px;
      font-size: 14px; box-shadow: 0 6px 20px rgba(0,0,0,.22);
      opacity: 0; pointer-events: none; z-index: 50;
      transition: opacity .2s, transform .2s;
    }
    .undo.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
    .undo button {
      background: none; border: none; color: #9ec6a3; font-weight: 700;
      font-size: 14px; cursor: pointer; padding: 4px 8px;
    }

    .text-overlay {
      position: fixed; inset: 0; z-index: 60;
      background: rgba(40, 38, 32, .55);
      display: none; flex-direction: column;
      justify-content: center; align-items: center; gap: 20px;
      padding: 0 28px;
    }
    .text-overlay.show { display: flex; }
    .text-input {
      width: 100%; max-width: 420px;
      font-family: "Nanum Pen Script", "Apple SD Gothic Neo", cursive;
      font-size: 30px; text-align: center; color: #fff;
      background: transparent; border: none;
      border-bottom: 2px solid rgba(255, 255, 255, .5);
      padding: 8px 4px; outline: none;
    }
    .text-input::placeholder { color: rgba(255, 255, 255, .45); }
    .text-actions { display: flex; gap: 12px; }
    .text-actions button {
      font-size: 15px; padding: 9px 22px; border-radius: 10px;
      border: none; cursor: pointer;
    }
    .text-actions .cancel { background: rgba(255, 255, 255, .18); color: #fff; }
    .text-actions .ok { background: var(--accent); color: #fff; }
  </style>
</head>
<body>
  <svg class="defs" width="0" height="0" aria-hidden="true" focusable="false">
    <filter id="rough" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="2" seed="6" result="n" />
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.4" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>

  <header>
    <h1>차 그림일기</h1>
    <p>오늘의 차림을 그림판에 놓아 간직하세요</p>
  </header>

  <main>
    <section class="compose">
      <div class="label">차림 <span class="hint">— 빈 곳 탭은 손글씨, 다구 탭은 차림</span></div>
      <div class="board empty" id="board">
        <svg class="paint" id="paint" viewBox="0 0 400 300" preserveAspectRatio="none"></svg>
      </div>

      <div class="paintbar" id="paintbar">
        <button type="button" id="drawToggle" class="draw-toggle">✏️ 색칠</button>
        <span class="swatches" id="swatches"></span>
        <button type="button" id="undoStroke" class="undo-stroke" title="한 획 지우기">↶</button>
      </div>

      <div class="palette" id="palette"></div>

      <div class="label">색</div>
      <input type="text" id="color" placeholder="맑은 호박빛…" />
      <div class="label">맛</div>
      <input type="text" id="taste" placeholder="고소하고 끝이 달았다…" />
      <div class="label">기분</div>
      <input type="text" id="mood" placeholder="차분해졌다…" />
      <div class="label">함께한 사람</div>
      <input type="text" id="withWhom" placeholder="혼자 / 누구와…" />

      <button class="save" id="save">간직하기</button>
    </section>

    <section class="timeline">
      <h2>지난 기록</h2>
      <div id="list"></div>
    </section>
  </main>

  <div id="undo" class="undo"></div>

  <div id="textOverlay" class="text-overlay">
    <input id="textInput" class="text-input" type="text" maxlength="60"
           placeholder="손글씨 한 줄…" autocomplete="off" />
    <div class="text-actions">
      <button type="button" id="textCancel" class="cancel">취소</button>
      <button type="button" id="textOk" class="ok">놓기</button>
    </div>
  </div>

  <script>
    "use strict";
    var STORE_KEY = "tea-cards";

    // 손그림풍 다구 (viewBox 0 0 64 64, 닫힌 실루엣 + 잉크 스트로크 + rough 손떨림 필터)
    var WARE = {
      teaboard: { name: "차판", scale: 1.75, svg: '<ellipse cx="32" cy="38" rx="24" ry="6"/><path d="M8 38 v5 q0 6 24 6 q24 0 24 -6 v-5 z"/>' },
      teapot:   { name: "다호", scale: 1.15, svg: '<path d="M18 36 q-8 1 -8 9 q0 5 5 7 q-2 -6 0 -10 q2 -5 7 -4 z"/><path d="M18 40 q0 -13 14 -13 q14 0 14 13 q0 11 -14 12 q-14 -1 -14 -12 z"/><path d="M46 35 q9 -3 12 4 q-3 -1 -6 0 q-3 -4 -8 -2 z"/><path d="M22 28 q10 -7 20 0 q-10 5 -20 0 z"/><circle cx="32" cy="24" r="2.6"/>' },
      cup:      { name: "잔",   scale: 0.7,  svg: '<path d="M23 33 q9 3 18 0 q-1 12 -9 15 q-8 -3 -9 -15 z"/><path d="M27 48 q5 2 10 0 q-1 3 -10 0 z"/>' },
      kettle:   { name: "주전자", scale: 1.2,  svg: '<path d="M22 32 q10 -14 21 -1 q-2 1 -4 2 q-8 -10 -14 -1 q-1 -1 -3 0 z"/><path d="M22 42 q0 -13 15 -13 q15 0 15 13 q0 11 -15 12 q-15 -1 -15 -12 z"/><path d="M50 38 q8 -2 10 4 q-3 -1 -6 0 q-2 -4 -7 -2 z"/><path d="M27 31 q10 -5 20 0 q-10 4 -20 0 z"/>' },
      pitcher:  { name: "숙우", scale: 0.95, svg: '<path d="M24 32 q9 2 18 0 l-3 16 q-6 4 -12 0 z"/><path d="M42 32 l6 -4 l-2 6 z"/>' },
      bowl:     { name: "차완", scale: 0.95, svg: '<path d="M16 35 q16 4 32 0 q-4 14 -16 16 q-12 -2 -16 -16 z"/><path d="M21 37 q11 3 22 0 q-11 2 -22 0 z"/>' },
      gaiwan:   { name: "개완", scale: 0.95, svg: '<path d="M16 46 q16 5 32 0 q-3 5 -16 5 q-13 0 -16 -5 z"/><path d="M20 40 q12 4 24 0 q-2 8 -12 9 q-10 -1 -12 -9 z"/><path d="M21 38 q11 -8 22 0 q-11 4 -22 0 z"/><circle cx="32" cy="29" r="2.4"/>' },
      aromacup: { name: "문향배", scale: 0.6, svg: '<path d="M26 30 q6 2 12 0 l-2 22 q-4 2 -8 0 z"/><ellipse cx="32" cy="30" rx="6" ry="2"/>' },
      saucer:   { name: "차탁", scale: 0.85, svg: '<path d="M14 38 q18 -6 36 0 q0 6 -18 6 q-18 0 -18 -6 z"/>' },
      scoop:    { name: "차시", scale: 0.8, svg: '<ellipse cx="20" cy="43" rx="9" ry="6"/><path d="M25 40 q12 -7 21 -15 q3 -3 5 -1 q2 2 -1 5 q-9 9 -22 16 z"/>' },
      whisk:    { name: "차선", scale: 0.85, svg: '<path d="M27 51 q-1 -8 0 -14 q0 -2 5 -2 q5 0 5 2 q1 6 0 14 z"/><path d="M24 35 q-2 -12 -3 -18"/><path d="M28 34 q-1 -13 -1 -19"/><path d="M32 34 v-19"/><path d="M36 34 q1 -13 1 -19"/><path d="M40 35 q2 -12 3 -18"/>' },
      caddy:    { name: "차통", scale: 0.85, svg: '<path d="M22 34 q10 -3 20 0 l0 18 q-10 3 -20 0 z"/><path d="M21 33 q11 -5 22 0 q0 4 -11 4 q-11 0 -11 -4 z"/><circle cx="32" cy="27" r="2"/>' },
      teapet:   { name: "차우", scale: 0.9, svg: '<path d="M43 47 q11 -1 11 -10 q0 -5 -5 -6 q-3 0 -3 3 q4 0 4 4 q0 5 -8 6 z"/><path d="M19 53 q0 -12 13 -12 q13 0 13 12 q0 4 -13 4 q-13 0 -13 -4 z"/><ellipse cx="25" cy="55" rx="4" ry="3"/><ellipse cx="39" cy="55" rx="4" ry="3"/><path d="M17 29 q0 -16 15 -16 q15 0 15 16 q0 13 -15 13 q-15 0 -15 -13 z"/><path d="M21 16 q-2 -7 4 -8 q3 0 3 5 z"/><path d="M43 16 q2 -7 -4 -8 q-3 0 -3 5 z"/><path d="M18 28 q-6 1 -6 6 q4 1 7 -2 z"/><path d="M46 28 q6 1 6 6 q-4 1 -7 -2 z"/><path d="M30 14 q2 -8 4 0 z"/><circle cx="26" cy="27" r="3.4"/><circle cx="38" cy="27" r="3.4"/><circle class="dot" cx="26" cy="27" r="1.9"/><circle class="dot" cx="38" cy="27" r="1.9"/><circle class="dot" cx="32" cy="32" r="1.4"/><path d="M28 35 q4 4 8 0"/>' }
    };
    var BOARD_BASE = 58, MINI_BASE = 22;
    var TEXT_BASE = 26, MINI_TEXT_BASE = 10, TEXT_RESIZE_BASE = 70;
    function wareScale(key) { return (WARE[key] && WARE[key].scale) || 1; }
    function isText(item) { return item.type === "text"; }
    var WARE_ORDER = ["teaboard", "teapot", "gaiwan", "kettle", "pitcher", "cup", "bowl", "aromacup", "saucer", "scoop", "whisk", "caddy", "teapet"];

    var placed = []; // 다구 {ware,x,y,s} | 손글씨 {type:'text',text,x,y,s} — x,y 는 그림판 대비 비율(0..1)

    function applySize(el, item) {
      if (isText(item)) el.style.fontSize = (TEXT_BASE * item.s) + "px";
      else el.style.width = (BOARD_BASE * wareScale(item.ware) * item.s) + "px";
    }

    var PAINT_COLORS = ["#d99a3a", "#9cbf6b", "#b6452f", "#3a3a32", "#7fa8c9", "#c98ab0"];
    var PAINT_W = 7;
    var strokes = [];               // [{c, w, p:[[rx,ry],...]}] — 점은 그림판 대비 비율
    var drawMode = false, drawColor = PAINT_COLORS[0];

    function strokeD(p) {
      if (!p.length) return "";
      var d = "M" + (p[0][0] * 400).toFixed(1) + " " + (p[0][1] * 300).toFixed(1);
      for (var i = 1; i < p.length; i++) d += "L" + (p[i][0] * 400).toFixed(1) + " " + (p[i][1] * 300).toFixed(1);
      return d;
    }
    function strokesPathsHtml(paint) {
      if (!Array.isArray(paint) || !paint.length) return "";
      return paint.map(function (s) {
        return '<path d="' + strokeD(s.p) + '" stroke="' + s.c + '" stroke-width="' + (s.w || PAINT_W) + '" fill="none"/>';
      }).join("");
    }

    function load() {
      try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
      catch (e) { return []; }
    }
    function save(cards) { localStorage.setItem(STORE_KEY, JSON.stringify(cards)); }
    function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v; }

    function fmtDate(iso) {
      var d = new Date(iso);
      var days = ["일", "월", "화", "수", "목", "금", "토"];
      return d.getFullYear() + ". " + (d.getMonth() + 1) + ". " + d.getDate() +
             " (" + days[d.getDay()] + ") " +
             String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0");
    }
    function svgWrap(key) {
      var w = WARE[key]; if (!w) return "";
      return '<svg class="ware-svg" viewBox="0 0 64 64"><g filter="url(#rough)">' + w.svg + "</g></svg>";
    }

    // ---- 작성 그림판 ----
    var board = document.getElementById("board");
    var paintSvg = document.getElementById("paint");

    function syncBoardEmpty() {
      board.classList.toggle("empty", placed.length === 0 && strokes.length === 0);
    }

    function renderStrokes() { paintSvg.innerHTML = strokesPathsHtml(strokes); }

    // 색칠: board 위에서 손가락이 지나간 자취를 한 획으로 쌓음
    function startStroke(e) {
      var b = board.getBoundingClientRect();
      var s = { c: drawColor, w: PAINT_W, p: [[(e.clientX - b.left) / b.width, (e.clientY - b.top) / b.height]] };
      strokes.push(s);
      var path = document.createElementNS("http://www.w3.org/2000/svg", "path");
      path.setAttribute("stroke", s.c);
      path.setAttribute("stroke-width", s.w);
      path.setAttribute("fill", "none");
      path.setAttribute("d", strokeD(s.p));
      paintSvg.appendChild(path);
      board.setPointerCapture(e.pointerId);
      function move(ev) {
        s.p.push([clamp((ev.clientX - b.left) / b.width, 0, 1), clamp((ev.clientY - b.top) / b.height, 0, 1)]);
        path.setAttribute("d", strokeD(s.p));
      }
      function up() {
        board.removeEventListener("pointermove", move);
        board.removeEventListener("pointerup", up);
        syncBoardEmpty();
      }
      board.addEventListener("pointermove", move);
      board.addEventListener("pointerup", up);
    }

    function setDrawMode(on) {
      drawMode = on;
      board.classList.toggle("draw", on);
      document.getElementById("paintbar").classList.toggle("on", on);
      document.getElementById("drawToggle").classList.toggle("on", on);
      if (on) selectPlaced(null);
    }

    function renderSwatches() {
      var wrap = document.getElementById("swatches");
      wrap.innerHTML = "";
      PAINT_COLORS.forEach(function (c) {
        var s = document.createElement("span");
        s.className = "swatch" + (c === drawColor ? " sel" : "");
        s.style.background = c;
        s.addEventListener("click", function () {
          drawColor = c;
          wrap.querySelectorAll(".swatch").forEach(function (n) { n.classList.remove("sel"); });
          s.classList.add("sel");
        });
        wrap.appendChild(s);
      });
    }

    function selectPlaced(el) {
      board.querySelectorAll(".placed.sel").forEach(function (n) { n.classList.remove("sel"); });
      if (el) el.classList.add("sel");
    }

    function makePlaced(item) {
      if (item.s == null) item.s = 1;
      var el = document.createElement("div");
      el.className = "placed" + (isText(item) ? " text" : "");
      el.style.left = (item.x * 100) + "%";
      el.style.top = (item.y * 100) + "%";
      applySize(el, item);
      if (item.ware === "teaboard") el.style.zIndex = "-1"; // 받침은 늘 뒤에 깔려 순서와 무관하게 다구가 위에 올라감
      var content = isText(item) ? '<span class="txt"></span>' : svgWrap(item.ware);
      el.innerHTML = content + '<span class="rm" title="치우기">×</span><span class="rs" title="크기 조절"></span>';
      if (isText(item)) el.querySelector(".txt").textContent = item.text;

      el.querySelector(".rm").addEventListener("click", function (e) {
        e.stopPropagation();
        placed.splice(placed.indexOf(item), 1);
        el.remove();
        syncBoardEmpty();
      });

      // 본체 드래그 = 이동 (탭하면 선택; 텍스트는 안 끌고 탭하면 편집)
      el.addEventListener("pointerdown", function (e) {
        if (e.target.classList.contains("rm") || e.target.classList.contains("rs")) return;
        selectPlaced(el);
        el.setPointerCapture(e.pointerId);
        el.classList.add("grab");
        var b = board.getBoundingClientRect();
        var px = (e.clientX - b.left) / b.width, py = (e.clientY - b.top) / b.height;
        var offx = item.x - px, offy = item.y - py;
        var sx = e.clientX, sy = e.clientY, moved = false;
        function move(ev) {
          if (Math.abs(ev.clientX - sx) + Math.abs(ev.clientY - sy) > 6) moved = true;
          item.x = clamp((ev.clientX - b.left) / b.width + offx, 0.08, 0.92);
          item.y = clamp((ev.clientY - b.top) / b.height + offy, 0.1, 0.9);
          el.style.left = (item.x * 100) + "%";
          el.style.top = (item.y * 100) + "%";
        }
        function up() {
          el.classList.remove("grab");
          el.removeEventListener("pointermove", move);
          el.removeEventListener("pointerup", up);
          if (!moved && isText(item)) openTextEditor(item, el);
        }
        el.addEventListener("pointermove", move);
        el.addEventListener("pointerup", up);
      });

      // 모서리 핸들 드래그 = 크기 조절 (중심~포인터 거리로 크기 역산)
      var rs = el.querySelector(".rs");
      rs.addEventListener("pointerdown", function (e) {
        e.stopPropagation();
        selectPlaced(el);
        rs.setPointerCapture(e.pointerId);
        el.classList.add("grab");
        var b = board.getBoundingClientRect();
        var cx = item.x * b.width, cy = item.y * b.height;
        var baseW = isText(item) ? TEXT_RESIZE_BASE : BOARD_BASE * wareScale(item.ware);
        function move(ev) {
          var dx = (ev.clientX - b.left) - cx, dy = (ev.clientY - b.top) - cy;
          var d = Math.sqrt(dx * dx + dy * dy);
          item.s = clamp((d * Math.SQRT2) / baseW, 0.4, 3);
          applySize(el, item);
        }
        function up() {
          el.classList.remove("grab");
          rs.removeEventListener("pointermove", move);
          rs.removeEventListener("pointerup", up);
        }
        rs.addEventListener("pointermove", move);
        rs.addEventListener("pointerup", up);
      });

      return el;
    }

    function addWare(key) {
      var n = placed.length;
      var item = {
        ware: key,
        x: clamp(0.5 + ((n % 3) - 1) * 0.2, 0.1, 0.9),
        y: clamp(0.38 + Math.floor(n / 3) * 0.2, 0.12, 0.88),
        s: 1
      };
      placed.push(item);
      var el = makePlaced(item);
      board.appendChild(el);
      selectPlaced(el); // 방금 올린 다구를 맨 앞으로 띄워 가려지지 않게
      el.classList.add("pop");
      el.addEventListener("animationend", function () { el.classList.remove("pop"); }, { once: true });
      syncBoardEmpty();
    }

    function renderPalette() {
      var pal = document.getElementById("palette");
      pal.innerHTML = "";
      WARE_ORDER.forEach(function (key) {
        var b = document.createElement("button");
        b.type = "button";
        b.innerHTML = '<span class="pic">' + svgWrap(key) + "</span><span class=\"nm\">" + WARE[key].name + "</span>";
        b.addEventListener("click", function () { addWare(key); });
        pal.appendChild(b);
      });
    }

    function clearBoard() {
      placed = [];
      strokes = [];
      board.querySelectorAll(".placed").forEach(function (n) { n.remove(); });
      renderStrokes();
      syncBoardEmpty();
    }

    // ---- 손글씨 텍스트 오버레이 ----
    var editingCtx = null; // 새로 놓기: {x,y}, 편집: {existing, el}

    function openTextEditor(existing, el, rx, ry) {
      editingCtx = { existing: existing || null, el: el || null, x: rx, y: ry };
      var input = document.getElementById("textInput");
      input.value = existing ? existing.text : "";
      document.getElementById("textOverlay").classList.add("show");
      setTimeout(function () { input.focus(); }, 30);
    }

    function closeTextEditor() {
      document.getElementById("textOverlay").classList.remove("show");
      document.getElementById("textInput").blur();
      editingCtx = null;
    }

    function commitText() {
      var ctx = editingCtx;
      var val = document.getElementById("textInput").value.trim();
      closeTextEditor();
      if (!ctx) return;
      if (ctx.existing) {
        if (!val) { // 빈 채로 확정 = 지우기
          placed.splice(placed.indexOf(ctx.existing), 1);
          ctx.el.remove();
          syncBoardEmpty();
        } else {
          ctx.existing.text = val;
          ctx.el.querySelector(".txt").textContent = val;
        }
        return;
      }
      if (!val) return;
      var item = { type: "text", text: val, x: ctx.x, y: ctx.y, s: 1 };
      placed.push(item);
      var el = makePlaced(item);
      board.appendChild(el);
      selectPlaced(el);
      el.classList.add("pop");
      el.addEventListener("animationend", function () { el.classList.remove("pop"); }, { once: true });
      syncBoardEmpty();
    }

    // ---- 타임라인 ----
    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
      });
    }
    function fieldLine(key, val) {
      if (!val) return "";
      return '<div><span class="k">' + key + '</span>' + escapeHtml(val) + "</div>";
    }

    function renderMini(teaware, paint) {
      // 신형: [{ware,x,y}] → 미니 그림판. 구형: ["🍵",...] → 이모지 줄.
      var paintHtml = strokesPathsHtml(paint);
      if (paintHtml) paintHtml = '<svg class="mini-paint" viewBox="0 0 400 300" preserveAspectRatio="none">' + paintHtml + "</svg>";
      if (Array.isArray(teaware) && teaware.length && typeof teaware[0] === "object") {
        var inner = teaware.map(function (it) {
          if (it.type === "text") {
            var fz = MINI_TEXT_BASE * (it.s || 1);
            return '<div class="placed text" style="left:' + (it.x * 100) + "%;top:" + (it.y * 100) + "%;font-size:" + fz + 'px">' + escapeHtml(it.text) + "</div>";
          }
          if (!WARE[it.ware]) return "";
          var w = MINI_BASE * wareScale(it.ware) * (it.s || 1);
          var z = it.ware === "teaboard" ? ";z-index:-1" : "";
          return '<div class="placed" style="left:' + (it.x * 100) + "%;top:" + (it.y * 100) + "%;width:" + w + "px" + z + '">' + svgWrap(it.ware) + "</div>";
        }).join("");
        return '<div class="mini">' + paintHtml + inner + "</div>";
      }
      var hasLegacy = Array.isArray(teaware) && teaware.length;
      var emojis = hasLegacy ? teaware.join(" ") : (paintHtml ? "" : "🍵");
      var legacy = emojis ? '<div class="legacy-ware" style="position:absolute;left:8px;top:8px">' + escapeHtml(emojis) + "</div>" : "";
      return '<div class="mini">' + paintHtml + legacy + "</div>";
    }

    function renderList(newId) {
      var list = document.getElementById("list");
      var cards = load();
      if (!cards.length) {
        list.innerHTML = '<div class="empty">아직 기록이 없어요.<br>첫 잔을 간직해보세요 🍵</div>';
        return;
      }
      list.innerHTML = "";
      cards.slice().reverse().forEach(function (card) {
        var el = document.createElement("div");
        el.className = "entry" + (card.id === newId ? " just-saved" : "");
        var fields =
          fieldLine("색", card.color) +
          fieldLine("맛", card.taste) +
          fieldLine("기분", card.mood) +
          fieldLine("함께", card.withWhom);
        if (!fields) fields = '<div class="none">차림만 간직한 날</div>';
        el.innerHTML =
          renderMini(card.teaware, card.paint) +
          '<div class="body">' +
            '<div class="date">' + fmtDate(card.createdAt) + "</div>" +
            '<div class="fields">' + fields + "</div>" +
          "</div>" +
          '<button class="del" title="삭제" data-id="' + card.id + '">×</button>';
        list.appendChild(el);
      });
      if (newId) {
        var fresh = list.querySelector(".just-saved");
        if (fresh) fresh.scrollIntoView({ behavior: "smooth", block: "center" });
      }
      list.querySelectorAll(".del").forEach(function (btn) {
        btn.addEventListener("click", function () {
          var id = btn.getAttribute("data-id");
          var cards = load();
          var idx = cards.findIndex(function (c) { return c.id === id; });
          if (idx === -1) return;
          var removed = cards[idx];
          cards.splice(idx, 1);
          save(cards);
          renderList();
          showUndo(removed, idx);
        });
      });
    }

    var undoTimer = null;
    function showUndo(card, index) {
      var toast = document.getElementById("undo");
      toast.innerHTML = '<span>기록을 지웠어요</span><button type="button">되돌리기</button>';
      toast.classList.add("show");
      if (undoTimer) clearTimeout(undoTimer);
      undoTimer = setTimeout(function () { toast.classList.remove("show"); }, 5000);
      toast.querySelector("button").addEventListener("click", function () {
        var cards = load();
        cards.splice(Math.min(index, cards.length), 0, card);
        save(cards);
        renderList(card.id);
        toast.classList.remove("show");
        if (undoTimer) clearTimeout(undoTimer);
      });
    }

    function handleSave() {
      var get = function (id) { return document.getElementById(id).value.trim(); };
      var now = new Date().toISOString();
      var card = {
        id: (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random()),
        teaware: placed.map(function (p) {
          return isText(p)
            ? { type: "text", text: p.text, x: p.x, y: p.y, s: p.s }
            : { ware: p.ware, x: p.x, y: p.y, s: p.s };
        }),
        paint: strokes.map(function (s) { return { c: s.c, w: s.w, p: s.p }; }),
        color: get("color"),
        taste: get("taste"),
        mood: get("mood"),
        withWhom: get("withWhom"),
        createdAt: now,
        updatedAt: now
      };
      var cards = load();
      cards.push(card);
      save(cards);

      clearBoard();
      ["color", "taste", "mood", "withWhom"].forEach(function (id) { document.getElementById(id).value = ""; });
      renderList(card.id);
    }

    // 빈 곳 탭: 선택 중이면 해제, 아니면 그 자리에 손글씨 입력
    var boardTap = null;
    board.addEventListener("pointerdown", function (e) {
      if (e.target !== board) return;
      if (drawMode) { startStroke(e); return; }
      boardTap = { x: e.clientX, y: e.clientY, hadSel: !!board.querySelector(".placed.sel") };
    });
    board.addEventListener("pointerup", function (e) {
      if (drawMode || e.target !== board || !boardTap) return;
      var moved = Math.abs(e.clientX - boardTap.x) + Math.abs(e.clientY - boardTap.y) > 8;
      var hadSel = boardTap.hadSel;
      boardTap = null;
      if (moved) return;
      if (hadSel) { selectPlaced(null); return; }
      var b = board.getBoundingClientRect();
      openTextEditor(null, null,
        clamp((e.clientX - b.left) / b.width, 0.08, 0.92),
        clamp((e.clientY - b.top) / b.height, 0.1, 0.9));
    });

    document.getElementById("textOk").addEventListener("click", commitText);
    document.getElementById("textCancel").addEventListener("click", closeTextEditor);
    document.getElementById("textInput").addEventListener("keydown", function (e) {
      if (e.key === "Enter") { e.preventDefault(); commitText(); }
    });

    document.getElementById("drawToggle").addEventListener("click", function () { setDrawMode(!drawMode); });
    document.getElementById("undoStroke").addEventListener("click", function () {
      strokes.pop();
      renderStrokes();
      syncBoardEmpty();
    });

    renderPalette();
    renderSwatches();
    syncBoardEmpty();
    renderList();
    document.getElementById("save").addEventListener("click", handleSave);
  </script>
</body>
</html>
